<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --primary: #1e88e5;
    --secondary: #2e7d32;
    --danger: #f44336;
    --success: #4caf50;
    --bg: #f4f7f6;
}
body { margin:0; font-family:Arial; background:var(--bg);}
header { background:var(--primary); color:#fff; padding:15px; text-align:center;}

.container { max-width:500px; margin:auto; padding:10px;}
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:10px;}

button { padding:10px; border:none; border-radius:6px; color:#fff; cursor:pointer;}
input, select { width:100%; padding:10px; margin:5px 0;}

.conta { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;}
.paga { opacity:0.5; text-decoration:line-through;}
</style>
</head>

<body>

<header>Minhas Contas</header>

<div class="container">

<div class="card">
<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor">
<button onclick="adicionarConta()" style="background:green;width:100%">Adicionar</button>
</div>

<div class="card">
<h3>Contas</h3>
<div id="lista"></div>
</div>

</div>

<script>

// 🔥 LIMPA DADOS ANTIGOS (executa uma vez)
if (!localStorage.getItem("limpezaFeita")) {
    localStorage.removeItem("dadosContas");
    localStorage.setItem("limpezaFeita", "true");
}

let dados = JSON.parse(localStorage.getItem("dadosContas")) || { contas: [] };

// FORMATAÇÃO
const formatar = v => v.toLocaleString('pt-br',{style:'currency',currency:'BRL'});

// ADICIONAR
function adicionarConta(){
    const nome = document.getElementById('nome').value;
    const valor = Number(document.getElementById('valor').value);

    if(!nome || !valor){
        alert("Preencha os campos");
        return;
    }

    dados.contas.push({
        id: Date.now().toString(),
        nome,
        valor,
        paga:false
    });

    salvar();
}

// PAGAR
function togglePagar(id){
    const conta = dados.contas.find(c => c.id === id);
    if(conta){
        conta.paga = !conta.paga;
        salvar();
    }
}

// EXCLUIR
function excluir(id){
    if(!confirm("Deseja excluir?")) return;

    dados.contas = dados.contas.filter(c => c.id !== id);
    salvar();
}

// SALVAR
function salvar(){
    localStorage.setItem("dadosContas", JSON.stringify(dados));
    render();
}

// RENDER
function render(){
    const lista = document.getElementById('lista');
    lista.innerHTML = "";

    if(!dados.contas || dados.contas.length === 0){
        lista.innerHTML = "<p>Nenhuma conta cadastrada</p>";
        return;
    }

    dados.contas.forEach(c=>{
        lista.innerHTML += `
        <div class="conta ${c.paga ? 'paga':''}">
            <div>
                <strong>${c.nome}</strong><br>
                ${formatar(c.valor)}
            </div>
            <div>
                <button onclick="togglePagar('${c.id}')" style="background:green">✔</button>
                <button onclick="excluir('${c.id}')" style="background:red">🗑</button>
            </div>
        </div>`;
    });
}

render();

</script>
</body>
</html>
