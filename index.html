<main class="max-w-md mx-auto px-4 -mt-8">
        <div class="mes-nav">
            <button onclick="mudarMes(-1)" class="p-2 hover:bg-gray-100 rounded-full">❮</button>
            <span id="mes-atual" class="font-bold text-gray-700 text-sm sm:text-lg uppercase">Janeiro 2026</span>
            <button onclick="mudarMes(1)" class="p-2 hover:bg-gray-100 rounded-full">❯</button>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6 text-center">
            <div class="bg-green-50 p-3 rounded-2xl border border-green-100">
                <p class="text-[10px] uppercase text-green-600 font-bold">Total Entradas</p>
                <p id="resumo-entradas" class="font-bold text-green-700">R$ 0,00</p>
            </div>
            <div class="bg-red-50 p-3 rounded-2xl border border-red-100">
                <p class="text-[10px] uppercase text-red-600 font-bold">Total Saídas</p>
                <p id="resumo-saidas" class="font-bold text-red-700">R$ 0,00</p>
            </div>
        </div>

        <div id="lista-contas" class="space-y-3">
            </div>
    </main>

    <script>
        let dataAtual = new Date();
        let database = JSON.parse(localStorage.getItem('db_financeiro_pro')) || { itens: [] };

        function mudarMes(direcao) {
            dataAtual.setMonth(dataAtual.getMonth() + direcao);
            renderizar();
        }

        function toggleParcelas() {
            const tipo = document.getElementById('input-recorrencia').value;
            document.getElementById('group-parcelas').classList.toggle('hidden', tipo !== 'parcelada');
        }

        function abrirModal() {
            document.getElementById('modal-conta').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('modal-conta').classList.remove('active');
            limparCampos();
        }

        function salvarItem() {
            const nome = document.getElementById('input-nome').value;
            const valor = parseFloat(document.getElementById('input-valor').value);
            const tipo = document.getElementById('input-tipo').value;
            const recorrencia = document.getElementById('input-recorrencia').value;
            const numParcelas = parseInt(document.getElementById('input-num-parcelas').value);

            if (!nome || isNaN(valor)) return alert("Preencha os campos corretamente.");

            const mesRef = dataAtual.getMonth();
            const anoRef = dataAtual.getFullYear();

            // Se for Renda, ignoramos parcelamento para simplificar (geralmente é fixo ou único)
            if (recorrencia === 'parcelada' && tipo === 'despesa') {
                const valorParcela = valor / numParcelas;
                for (let i = 0; i < numParcelas; i++) {
                    let d = new Date(anoRef, mesRef + i, 1);
                    database.itens.push({
                        id: Date.now() + i,
                        nome: `${nome} (${i+1}/${numParcelas})`,
                        valor: valorParcela,
                        tipo,
                        mes: d.getMonth(),
                        ano: d.getFullYear(),
                        paga: false,
                        recorrencia: 'parcelada'
                    });
                }
            } else {
                database.itens.push({
                    id: Date.now(),
                    nome,
                    valor,
                    tipo,
                    mes: mesRef,
                    ano: anoRef,
                    paga: tipo === 'renda', // Renda já nasce "paga/recebida"
                    recorrencia
                });
            }

            salvarDB();
            fecharModal();
            renderizar();
        }

        function toggleStatus(id) {
            const item = database.itens.find(i => i.id === id);
            if (item && item.tipo === 'despesa') item.paga = !item.paga;
            salvarDB();
            renderizar();
        }

        function excluirItem(id) {
            if (confirm("Excluir este registro?")) {
                database.itens = database.itens.filter(i => i.id !== id);
                salvarDB();
                renderizar();
            }
        }

        function salvarDB() {
            localStorage.setItem('db_financeiro_pro', JSON.stringify(database));
        }

        function renderizar() {
            const container = document.getElementById('lista-contas');
            const mesRef = dataAtual.getMonth();
            const anoRef = dataAtual.getFullYear();
            
            document.getElementById('mes-atual').innerText = dataAtual.toLocaleString('pt-br', { month: 'long', year: 'numeric' });

            container.innerHTML = '';
            let totalRenda = 0;
            let totalDespesa = 0;
            let totalPago = 0;

            const itensMes = database.itens.filter(i => {
                if (i.recorrencia === 'fixa') return true; 
                return i.mes === mesRef && i.ano === anoRef;
            });

            itensMes.forEach(item => {
                if (item.tipo === 'renda') totalRenda += item.valor;
                else {
                    totalDespesa += item.valor;
                    if (item.paga) totalPago += item.valor;
                }

                const card = document.createElement('div');
                // Estilo diferente para Renda (Azul) e Despesa (Vermelho/Verde)
                const isRenda = item.tipo === 'renda';
                
                card.className = `app-card flex justify-between items-center border-l-4 ${
                    isRenda ? 'border-blue-500 bg-blue-50' : (item.paga ? 'border-green-500 opacity-75' : 'border-red-500')
                }`;

                card.innerHTML = `
                    <div onclick="${isRenda ? '' : `toggleStatus(${item.id})`}" class="flex-1 cursor-pointer">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">${isRenda ? '💰' : '💸'}</span>
                            <h4 class="font-bold text-gray-800 ${!isRenda && item.paga ? 'line-through text-gray-400' : ''}">${item.nome}</h4>
                        </div>
                        <p class="text-[10px] text-gray-500 ml-7 uppercase">${item.recorrencia}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold ${isRenda ? 'text-blue-600' : (item.paga ? 'text-green-600' : 'text-red-500')}">
                            ${isRenda ? '+' : '-'} R$ ${item.valor.toFixed(2)}
                        </p>
                        <button onclick="excluirItem(${item.id})" class="text-[10px] text-gray-400 hover:text-red-500">Excluir</button>
                    </div>
                `;
                container.appendChild(card);
            });

            // Atualização dos Painéis
            const saldoFinal = totalRenda - totalDespesa;
            document.getElementById('display-renda').innerText = `R$ ${totalRenda.toFixed(2)}`;
            document.getElementById('resumo-entradas').innerText = `R$ ${totalRenda.toFixed(2)}`;
            document.getElementById('resumo-saidas').innerText = `R$ ${totalDespesa.toFixed(2)}`;
            
            const displaySaldo = document.getElementById('display-saldo');
            displaySaldo.innerText = `R$ ${saldoFinal.toFixed(2)}`;
            
            // Lógica de Cores do Saldo
            displaySaldo.className = saldoFinal < 0 ? "text-2xl font-bold text-red-300" : "text-2xl font-bold text-green-300";
        }

        function limparCampos() {
            document.getElementById('input-nome').value = '';
            document.getElementById('input-valor').value = '';
            document.getElementById('input-tipo').value = 'despesa';
            document.getElementById('input-recorrencia').value = 'unica';
            document.getElementById('group-parcelas').classList.add('hidden');
        }

        renderizar();
    </script>
