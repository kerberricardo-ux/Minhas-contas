<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Contas Pro - Ricardo Kerber</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e88e5;
            --secondary: #2e7d32;
            --danger: #f44336;
            --success: #4caf50;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; font-size: 22px; font-weight: bold; }

        .mesControle { display: flex; justify-content: space-around; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #ddd; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        .conta { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .paga { opacity: 0.5; text-decoration: line-through; }
        
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; text-transform: uppercase; margin-left: 5px; }
        .tag-fixa { background: #673ab7; }
        .tag-parcelada { background: #ff9800; }
        .tag-normal { background: #9e9e9e; }

        .resumo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; margin-bottom: 15px; }
        .saldo-box { grid-column: span 2; padding: 10px; border-radius: 8px; font-weight: bold; }
        .positivo { background: #e8f5e9; color: var(--secondary); }
        .negativo { background: #ffebee; color: var(--danger); }

        canvas { max-width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<header>Minhas Contas</header>

<div class="mesControle">
    <button onclick="mudarMes(-1)">←</button>
    <div id="mesAtual" style="font-size: 18px; font-weight: bold;"></div>
    <button onclick="mudarMes(1)">→</button>
</div>

<div class="container">
    <div class="card">
        <div class="resumo-grid">
            <div><small>Renda Total</small><br><strong id="rendaTotal">R$ 0,00</strong></div>
            <div><small>Gasto Total</small><br><strong id="gastoTotal">R$ 0,00</strong></div>
            <div id="saldoCard" class="saldo-box">Saldo: <span id="saldoMostra">R$ 0,00</span></div>
        </div>
        <canvas id="meuGrafico"></canvas>
    </div>

    <div class="card">
        <h3>Novo Lançamento</h3>
        <input id="salario" type="number" placeholder="Salário Base">
        <input id="extra" type="number" placeholder="Extras">
        <button onclick="salvarRenda()" style="width: 100%; margin-bottom: 15px;">Atualizar Renda</button>
        <hr>
        <input id="nome" placeholder="Descrição (Ex: Aluguel)">
        <input id="valor" type="number" placeholder="Valor R$">
        <select id="tipo" onchange="document.getElementById('divParcelas').style.display = (this.value === 'parcelada' ? 'block' : 'none')">
            <option value="normal">Gasto Único</option>
            <option value="fixa">Conta Fixa</option>
            <option value="parcelada">Parcelado</option>
        </select>
        <div id="divParcelas" style="display: none;"><input id="parcelas" type="number" placeholder="Nº de Parcelas" value="1"></div>
        <button onclick="adicionarConta()" style="width: 100%; background: var(--secondary);">Adicionar Conta</button>
    </div>

    <div class="card">
        <h3>Lista de Contas</h3>
        <div id="lista"></div>
    </div>
</div>

<script>
    let dados = JSON.parse(localStorage.getItem("dadosContas")) || {};
    let hj = new Date();
    let mes = hj.getMonth();
    let ano = hj.getFullYear();
    let meuGrafico = null;

    const formatar = (v) => v.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const getChave = (m, a) => `${a}-${m}`;

    function mudarMes(delta) {
        mes += delta;
        if (mes < 0) { mes = 11; ano--; }
        if (mes > 11) { mes = 0; ano++; }
        verificarEReplicarFixas();
        render();
    }

    function verificarEReplicarFixas() {
        const chaveAtual = getChave(mes, ano);
        if (!dados[chaveAtual] || dados[chaveAtual].contas.length === 0) {
            let mAnt = mes - 1, aAnt = ano;
            if (mAnt < 0) { mAnt = 11; aAnt--; }
            const chaveAnt = getChave(mAnt, aAnt);

            if (dados[chaveAnt]) {
                const fixas = dados[chaveAnt].contas.filter(c => c.tipo === 'fixa');
                dados[chaveAtual] = { salario: dados[chaveAnt].salario, extra: 0, contas: [] };
                fixas.forEach(f => {
                    dados[chaveAtual].contas.push({ ...f, id: String(Date.now() + Math.random()), paga: false });
                });
                salvar();
            }
        }
    }

    function salvarRenda() {
        const chave = getChave(mes, ano);
        if (!dados[chave]) dados[chave] = { salario: 0, extra: 0, contas: [] };
        dados[chave].salario = Number(document.getElementById('salario').value);
        dados[chave].extra = Number(document.getElementById('extra').value);
        salvar();
    }

    function adicionarConta() {
        const nome = document.getElementById('nome').value;
        const valor = Number(document.getElementById('valor').value);
        const tipo = document.getElementById('tipo').value;
        const numParcelas = tipo === 'parcelada' ? Number(document.getElementById('parcelas').value) : 1;

        if (!nome || !valor) return alert("Preencha descrição e valor!");

        for (let i = 0; i < numParcelas; i++) {
            let m = mes + i, a = ano;
            while (m > 11) { m -= 12; a++; }
            const chave = getChave(m, a);
            if (!dados[chave]) dados[chave] = { salario: 0, extra: 0, contas: [] };
            dados[chave].contas.push({
                id: String(Date.now() + Math.random()),
                nome: tipo === 'parcelada' ? `${nome} (${i+1}/${numParcelas})` : nome,
                valor, tipo, paga: false
            });
        }
        salvar();
        document.getElementById('nome').value = '';
        document.getElementById('valor').value = '';
    }

    function togglePagar(id) {
        const chave = getChave(mes, ano);
        const conta = dados[chave].contas.find(c => c.id === id);
        if (conta) { conta.paga = !conta.paga; salvar(); }
    }

    function excluir(id) {
        if (!confirm("Excluir esta conta?")) return;
        const chave = getChave(mes, ano);
        dados[chave].contas = dados[chave].contas.filter(c => c.id !== id);
        salvar();
    }

    function salvar() {
        localStorage.setItem("dadosContas", JSON.stringify(dados));
        render();
    }

    function atualizarGrafico(valores) {
        const ctx = document.getElementById('meuGrafico').getContext('2d');
        if (meuGrafico) meuGrafico.destroy();
        
        meuGrafico = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Único', 'Fixo', 'Parcelado'],
                datasets: [{
                    data: valores,
                    backgroundColor: ['#9e9e9e', '#673ab7', '#ff9800'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });
    }

    function render() {
        const chave = getChave(mes, ano);
        const mesesNomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        document.getElementById('mesAtual').innerText = `${mesesNomes[mes]} / ${ano}`;

        if (!dados[chave]) dados[chave] = { salario: 0, extra: 0, contas: [] };
        const d = dados[chave];
        document.getElementById('salario').value = d.salario;
        document.getElementById('extra').value = d.extra;

        let totalGasto = 0, gNormal = 0, gFixa = 0, gParcelada = 0;
        const listaDiv = document.getElementById('lista');
        listaDiv.innerHTML = "";

        d.contas.forEach(c => {
            totalGasto += c.valor;
            if (c.tipo === 'fixa') gFixa += c.valor;
            else if (c.tipo === 'parcelada') gParcelada += c.valor;
            else gNormal += c.valor;

            listaDiv.innerHTML += `
                <div class="conta ${c.paga ? 'paga' : ''}">
                    <div><strong>${c.nome}</strong> <span class="tag tag-${c.tipo}">${c.tipo}</span><br><small>${formatar(c.valor)}</small></div>
                    <div>
                        <button onclick="togglePagar('${c.id}')" style="background:var(--success)">✔</button>
                        <button onclick="excluir('${c.id}')" style="background:var(--danger)">🗑</button>
                    </div>
                </div>`;
        });

        const renda = d.salario + d.extra;
        const saldo = renda - totalGasto;
        document.getElementById('rendaTotal').innerText = formatar(renda);
        document.getElementById('gastoTotal').innerText = formatar(totalGasto);
        document.getElementById('saldoMostra').innerText = formatar(saldo);
        document.getElementById('saldoCard').className = `saldo-box ${saldo >= 0 ? 'positivo' : 'negativo'}`;

        atualizarGrafico([gNormal, gFixa, gParcelada]);
    }

    render();
</script>
</body>
</html>
