<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Contas PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #1e88e5;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.mesControle {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: white;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #1e88e5;
    color: white;
    cursor: pointer;
}

button:hover { background: #1565c0; }

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.conta {
    background: white;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}

.conta.paga {
    background: #e8f5e9;
    text-decoration: line-through;
    color: gray;
}

.saldo-positivo { color: green; }
.saldo-negativo { color: red; }

</style>
</head>

<body>

<header>💰 Controle de Contas</header>

<div class="mesControle">
    <button onclick="App.mesAnterior()">←</button>
    <div id="mesAtual"></div>
    <button onclick="App.mesProximo()">→</button>
</div>

<div class="container">

<div class="card">
    <div>Salário: R$ <span id="salarioMostra">0</span></div>
    <div>Extras: R$ <span id="extraMostra">0</span></div>
    <div><strong>Saldo Real: R$ <span id="saldoReal">0</span></strong></div>
</div>

<div class="card">
    <h3>Configurar</h3>
    <input id="salario" type="number" placeholder="Salário">
    <input id="extra" type="number" placeholder="Extra">
    <button onclick="App.salvarSalario()">Salvar</button>
</div>

<div class="card">
    <h3>Adicionar Conta</h3>
    <input id="nome" placeholder="Nome da conta">
    <input id="valor" type="number" placeholder="Valor">

    <select id="tipo" onchange="App.toggleParcelas()">
        <option value="normal">Normal</option>
        <option value="parcelada">Parcelada</option>
    </select>

    <div id="parcelasDiv" style="display:none;">
        <input id="parcelas" type="number" value="1">
    </div>

    <button onclick="App.adicionarConta()">Adicionar</button>
</div>

<div class="card">
    <h3>Contas</h3>
    <div id="lista"></div>
</div>

</div>

<script>
const App = {

    dados: JSON.parse(localStorage.getItem("contasPRO")) || {},

    data: new Date(),
    mes: new Date().getMonth(),
    ano: new Date().getFullYear(),

    meses: ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"],

    chave(m=this.mes, a=this.ano) {
        return a + "-" + m;
    },

    getMes() {
        if (!this.dados[this.chave()]) {
            this.dados[this.chave()] = { salario:0, extra:0, contas:[] };
        }
        return this.dados[this.chave()];
    },

    init() {
        this.atualizarMes();
    },

    atualizarMes() {
        document.getElementById("mesAtual").innerText =
            this.meses[this.mes] + " / " + this.ano;
        this.render();
    },

    mesAnterior() {
        this.mes--;
        if(this.mes < 0){ this.mes=11; this.ano--; }
        this.atualizarMes();
    },

    mesProximo() {
        this.mes++;
        if(this.mes > 11){ this.mes=0; this.ano++; }
        this.atualizarMes();
    },

    salvar() {
        localStorage.setItem("contasPRO", JSON.stringify(this.dados));
    },

    salvarSalario() {
        const d = this.getMes();
        d.salario = Number(document.getElementById("salario").value) || 0;
        d.extra = Number(document.getElementById("extra").value) || 0;
        this.salvar();
        this.render();
    },

    toggleParcelas() {
        document.getElementById("parcelasDiv").style.display =
            document.getElementById("tipo").value === "parcelada" ? "block" : "none";
    },

    adicionarConta() {

        const nome = document.getElementById("nome").value.trim();
        const valor = Number(document.getElementById("valor").value);

        if(!nome || valor <= 0){
            alert("Preencha corretamente!");
            return;
        }

        const tipo = document.getElementById("tipo").value;
        const parcelas = tipo === "parcelada"
            ? Number(document.getElementById("parcelas").value)
            : 1;

        let m = this.mes;
        let a = this.ano;

        for(let i=0;i<parcelas;i++){

            const chave = this.chave(m,a);

            if(!this.dados[chave]){
                this.dados[chave] = { salario:0, extra:0, contas:[] };
            }

            this.dados[chave].contas.push({
                nome: parcelas>1 ? `${nome} (${i+1}/${parcelas})` : nome,
                valor: valor,
                paga:false
            });

            m++;
            if(m>11){ m=0; a++; }
        }

        this.salvar();
        this.render();

        document.getElementById("nome").value="";
        document.getElementById("valor").value="";
    },

    pagar(i){
        const d = this.getMes();
        d.contas[i].paga = !d.contas[i].paga;
        this.salvar();
        this.render();
    },

    remover(i){
        if(confirm("Excluir conta?")){
            this.getMes().contas.splice(i,1);
            this.salvar();
            this.render();
        }
    },

    render(){

        const d = this.getMes();

        document.getElementById("salarioMostra").innerText = d.salario.toFixed(2);
        document.getElementById("extraMostra").innerText = d.extra.toFixed(2);

        let totalPago = 0;

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        d.contas.forEach((c,i)=>{

            const div = document.createElement("div");
            div.className = "conta" + (c.paga ? " paga": "");

            div.innerHTML = `
                <div>${c.nome} - R$ ${c.valor.toFixed(2)}</div>
                <div>
                    <button onclick="App.pagar(${i})">✔</button>
                    <button onclick="App.remover(${i})">🗑</button>
                </div>
            `;

            lista.appendChild(div);

            if(c.paga) totalPago += c.valor;
        });

        const saldo = (d.salario + d.extra) - totalPago;

        const saldoEl = document.getElementById("saldoReal");
        saldoEl.innerText = saldo.toFixed(2);
        saldoEl.className = saldo >= 0 ? "saldo-positivo" : "saldo-negativo";
    }
};

App.init();
</script>

</body>
</html>
